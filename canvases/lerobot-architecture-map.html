    HTML.models = `
      <div class="stack">

              <tr><td>VLA</td><td>SmolVLA, π0/π0.5/π0-Fast, GR00T, XVLA, Wall-X, EO-1, EVO1, MolmoAct2</td><td>语言条件、多任务、跨本体迁移</td><td>SmolVLA ~4GB；大 VLA 常需 16GB+</td></tr>

              <tr><td>世界模型</td><td>VLA-JEPA, LingBot-VA, FastWAM</td><td>预测未来表征/视频，辅助规划或预训练</td><td>通常偏重</td></tr>
              <tr><td>奖励模型</td><td>SARM, TOPReward, Robometer</td><td>从演示/视频估计奖励，服务 RL 或筛选</td><td>中等</td></tr>

            <p>CLI：<strong>--policy.type=act</strong></p>
          </div></div>
          <div class="card"><div class="card-h">SmolVLA <span class="pill info">下一步</span></div><div class="card-b">

        </div>
      </div>`;

    HTML.pipeline = `

    function activate(id) {
      document.querySelectorAll(".tab-btn").forEach((b) => b.classList.toggle("is-active", b.dataset.id === id));
      document.querySelectorAll(".panel").forEach((p) => p.classList.toggle("is-active", p.dataset.id === id));
      history.replaceState(null, "", "#" + id);
    }

    const tabsEl = document.getElementById("tabs");
    const panelsEl = document.getElementById("panels");
    TABS.forEach((t) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "tab-btn";
      btn.dataset.id = t.id;
      btn.textContent = t.label;
      btn.addEventListener("click", () => activate(t.id));
      tabsEl.appendChild(btn);

      const panel = document.createElement("div");
      panel.className = "panel";
      panel.dataset.id = t.id;
      panel.innerHTML = HTML[t.id];
      panelsEl.appendChild(panel);
    });

    const initial = (location.hash || "#overview").slice(1);
    activate(TABS.some((t) => t.id === initial) ? initial : "overview");
    if (window.CanvasTheme) CanvasTheme.init();
