name: Sync Zhihu stats

on:
  schedule:
    # Every Monday at 02:00 UTC (~10:00 Beijing time)
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Zhihu stats
        run: python3 tools/fetch_zhihu_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tools/snapshots/zhihu_stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Zhihu stats [skip ci]"
            git push
          fi
